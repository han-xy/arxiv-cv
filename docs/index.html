<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>arXiv cs.CV Digest</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">arXiv cs.CV recent</p>
        <h1>每日论文摘要</h1>
      </div>
      <div class="actions">
        <button id="refreshBtn" type="button" title="重新加载数据">
          <span aria-hidden="true">↻</span>
          更新
        </button>
      </div>
    </header>

    <main>
      <section class="controls" aria-label="筛选">
        <label class="search">
          <span>搜索</span>
          <input id="searchInput" type="search" placeholder="标题、作者、关键词" />
        </label>
        <label>
          <span>语言</span>
          <select id="languageSelect">
            <option value="both">中英双语</option>
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </label>
        <label>
          <span>排序</span>
          <select id="sortSelect">
            <option value="newest">最新发布</option>
            <option value="title">标题</option>
          </select>
        </label>
      </section>

      <section class="status-row" aria-live="polite">
        <div id="statusText">正在加载论文...</div>
        <div id="metaText"></div>
      </section>

      <section id="paperList" class="paper-list" aria-label="论文列表"></section>
    </main>

    <template id="paperTemplate">
      <article class="paper-card">
        <div class="paper-head">
          <div>
            <p class="paper-id"></p>
            <h2 class="title-zh"></h2>
            <h3 class="title-en"></h3>
          </div>
          <div class="links">
            <a class="abs-link" target="_blank" rel="noreferrer">Abs</a>
            <a class="pdf-link" target="_blank" rel="noreferrer">PDF</a>
          </div>
        </div>
        <p class="authors"></p>
        <div class="tag-row"></div>
        <div class="summary-grid">
          <section class="summary summary-zh">
            <h4>中文摘要</h4>
            <p></p>
          </section>
          <section class="summary summary-en">
            <h4>English Abstract</h4>
            <p></p>
          </section>
        </div>
      </article>
    </template>

    <script src="app.js" type="module"></script>
  </body>
</html>
